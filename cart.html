<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Shopping Cart — Kwabz Store</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .cart-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
    }
    @media (min-width: 768px) {
      .cart-layout {
        grid-template-columns: 1fr 380px;
      }
    }
    
    .cart-item-card {
      background: var(--surface-container-lowest);
      border: 1px solid var(--outline-variant);
      border-radius: var(--radius-xl);
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .cart-item-header {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .cart-item-img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: var(--radius-lg);
      flex-shrink: 0;
    }

    .cart-item-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--outline-variant);
      padding-top: 1rem;
      margin-top: 0.25rem;
    }

    @media (min-width: 600px) {
      .cart-item-card {
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
      }
      .cart-item-controls {
        border-top: none;
        padding-top: 0;
        margin-top: 0;
        gap: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="container" style="max-width: 900px; margin: 0 auto; padding: 1.5rem; padding-top: 2rem;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--outline-variant);">
      <h1 style="font-family: var(--font-headline); font-size: 1.75rem; font-weight: 700;">Shopping Cart</h1>
      <button onclick="window.history.back()" style="display: inline-flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; background: var(--surface-container); cursor: pointer; border: none; transition: background 0.2s;">
        <span class="material-symbols-outlined">arrow_back</span>
      </button>
    </div>

    <!-- Auth Required -->
    <div id="authRequired" style="display: none;">
      <div style="text-align: center; padding: 2rem; background: var(--surface-container-lowest); border-radius: var(--radius-xl); border: 1px solid var(--outline-variant);">
        <span class="material-symbols-outlined" style="font-size: 2.5rem; margin-bottom: 1rem; opacity: 0.5; display: block;">shopping_cart</span>
        <p style="color: var(--on-surface-variant); margin-bottom: 1rem;">Sign in to your account to manage your shopping cart</p>
        <div style="display: flex; gap: 1rem; justify-content: center;">
          <a href="login.html" style="padding: 0.75rem 1.5rem; background: var(--primary); color: white; border-radius: var(--radius-lg); text-decoration: none; font-weight: 600;">Sign In</a>
          <a href="signup.html" style="padding: 0.75rem 1.5rem; background: var(--surface-container); color: var(--on-surface); border: 1px solid var(--outline-variant); border-radius: var(--radius-lg); text-decoration: none; font-weight: 600;">Create Account</a>
        </div>
      </div>
    </div>

    <!-- Cart Content -->
    <div id="cartContent" class="cart-layout" style="display: none;">
      <div id="cartItemsContainer" style="display: flex; flex-direction: column; gap: 1rem;"></div>

      <div style="background: var(--surface-container-lowest); border: 1px solid var(--outline-variant); border-radius: var(--radius-2xl); padding: 1.5rem; height: fit-content; position: sticky; top: 1.5rem;">
        <div style="font-family: var(--font-headline); font-size: 1.1rem; font-weight: 700; margin-bottom: 1.5rem;">Order Summary</div>

        <div style="display: flex; justify-content: space-between; padding: 0.75rem 0; font-size: 0.9rem; color: var(--on-surface-variant);">
          <span>Subtotal</span>
          <span id="subtotal">GH₵0.00</span>
        </div>

        <div style="display: flex; justify-content: space-between; padding: 0.75rem 0; font-size: 0.9rem; color: var(--on-surface-variant);">
          <span>Shipping</span>
          <span id="shipping">GH₵0.00</span>
        </div>

        <div style="display: flex; justify-content: space-between; padding: 0.75rem 0 1rem 0; border-top: 1px solid var(--outline-variant); border-bottom: 1px solid var(--outline-variant); font-size: 1.1rem; font-weight: 700;">
          <span>Total</span>
          <span id="total">GH₵0.00</span>
        </div>

        <button onclick="proceedToCheckout()" style="width: 100%; padding: 1rem; background: var(--primary); color: white; border: none; border-radius: var(--radius-lg); font-weight: 600; cursor: pointer; margin-top: 1.5rem;">Proceed to Checkout</button>

        <div style="text-align: center; margin-top: 1.5rem;">
          <a href="shop.html" style="color: var(--primary); font-weight: 600; text-decoration: none;">Continue Shopping</a>
        </div>
      </div>
    </div>

    <!-- Empty Cart -->
    <div id="emptyCart" style="display: none;">
      <div style="text-align: center; padding: 3rem 1.5rem; background: var(--surface-container-lowest); border-radius: var(--radius-2xl); border: 1px solid var(--outline-variant);">
        <div style="font-size: 3rem; margin-bottom: 1rem; opacity: 0.5;">🛒</div>
        <h2 style="font-family: var(--font-headline); font-size: 1.25rem; margin-bottom: 0.5rem; color: var(--on-surface-variant);">Your Cart is Empty</h2>
        <p style="color: var(--on-surface-variant); margin-bottom: 1.5rem;">Start shopping and add items to your cart</p>
        <a href="shop.html" style="display: inline-block; padding: 0.875rem 1.5rem; background: var(--primary); color: white; border-radius: var(--radius-lg); text-decoration: none; font-weight: 600;">Continue Shopping</a>
      </div>
    </div>
  </div>

  <!-- Firebase & Scripts -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="store.js"></script>
  <script src="utils.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAt6xHMVvJ82iJSb8XO_bYGfxLKncG8oUE",
      authDomain: "mr-rager.firebaseapp.com",
      projectId: "mr-rager",
      storageBucket: "mr-rager.firebasestorage.app",
      messagingSenderId: "731077938078",
      appId: "1:731077938078:web:878fc483d6e1921bcca48f",
      measurementId: "G-1Y14WBJV3H"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }

    KwabzStore.init();
    if (!KwabzUtils.requireLogin()) throw new Error("Auth required");
    KwabzUtils.initAuthNavigation();

    // ─── Cart Page Logic ───
    const cartItemsContainer = document.getElementById('cartItemsContainer');
    const subtotalEl = document.getElementById('subtotal');
    const totalEl = document.getElementById('total');
    const cartContent = document.getElementById('cartContent');
    const emptyCart = document.getElementById('emptyCart');
    const authRequired = document.getElementById('authRequired');

    function renderCart() {
      authRequired.style.display = 'none';
      const cart = KwabzStore.getCart();
      
      if (cart.length === 0) {
        cartContent.style.display = 'none';
        emptyCart.style.display = 'block';
        return;
      }

      emptyCart.style.display = 'none';
      cartContent.style.display = 'grid';

      cartItemsContainer.innerHTML = cart.map(item => `
        <div class="cart-item-card">
          <div class="cart-item-header">
            <img class="cart-item-img" src="${item.image_url}" alt="${item.name}" />
            <div style="flex: 1; min-width: 0;">
              <h3 style="font-weight: 600; font-size: 1rem; margin-bottom: 0.25rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${item.name}</h3>
              <p style="color: var(--primary); font-weight: 700;">${KwabzUtils.formatPrice(item.price)}</p>
            </div>
          </div>
          
          <div class="cart-item-controls">
            <div style="display: flex; align-items: center; background: var(--surface-container); border-radius: 4rem; padding: 0.25rem;">
              <button onclick="updateQty('${item.product_id}', ${item.quantity - 1})" style="width: 32px; height: 32px; border-radius: 50%; border: none; background: white; cursor: pointer; font-size: 1.25rem; display: flex; align-items: center; justify-content: center;">-</button>
              <span style="padding: 0 1rem; font-weight: 600;">${item.quantity}</span>
              <button onclick="updateQty('${item.product_id}', ${item.quantity + 1})" style="width: 32px; height: 32px; border-radius: 50%; border: none; background: white; cursor: pointer; font-size: 1.25rem; display: flex; align-items: center; justify-content: center;">+</button>
            </div>
            <button onclick="removeFromCart('${item.product_id}')" style="color: var(--error); border: none; background: var(--surface-container); border-radius: 50%; width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center;" title="Remove">
              <span class="material-symbols-outlined" style="font-size: 1.25rem;">delete</span>
            </button>
          </div>
        </div>
      `).join('');

      const subtotal = KwabzStore.getCartTotal();
      subtotalEl.textContent = KwabzUtils.formatPrice(subtotal);
      totalEl.textContent = KwabzUtils.formatPrice(subtotal); // No shipping logic yet

      // ─── Smart Header Branding ───
      const sellerBranding = KwabzUtils.getCartBranding();
      const headerTitle = document.querySelector('h1');
      if (sellerBranding && headerTitle) {
        headerTitle.textContent = `${sellerBranding} Cart`;
      } else if (headerTitle) {
        headerTitle.textContent = 'Shopping Cart';
      }
    }

    function updateQty(id, qty) {
      KwabzStore.updateCartQuantity(id, qty);
    }

    function removeFromCart(id) {
      KwabzStore.removeFromCart(id);
      KwabzUtils.toast('Item removed from cart');
    }

    function proceedToCheckout() {
      window.location.href = 'checkout.html';
    }

    KwabzStore.on('cart_changed', () => renderCart());
    KwabzStore.on('user_changed', () => renderCart());
    KwabzStore.on('products_changed', () => renderCart());

    // Initial render
    setTimeout(renderCart, 500);
    KwabzUtils.updateCartBadge();
  </script>
</body>

</html>
